version: 2

updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"

      open-pull-requests-limit: 5

      ignore:
          - dependency-name: "*"
            update-types:
                - "version-update:semver-major"

      groups:
          dependencies:
              patterns:
                  - "*"

    - package-ecosystem: "npm"
      directory: "/src/client"
      schedule:
          interval: "weekly"

      open-pull-requests-limit: 5

      ignore:
          - dependency-name: "*"
            update-types:
                - "version-update:semver-major"

      groups:
          dependencies:
              patterns:
                  - "*"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"

      open-pull-requests-limit: 5

      ignore:
          - dependency-name: "*"
            update-types:
                - "version-update:semver-major"

      groups:
          dependencies:
              patterns:
                  - "*"
