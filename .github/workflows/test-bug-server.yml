name: BUG Server Tests

env:
    SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

permissions:
    contents: read

on:
    push:
        branches:
            - main
        paths:
            - "src/server/**"
            - "config/**"
            - "package.json"
            - "package-lock.json"
            - ".github/workflows/test-bug-server.yml"
    pull_request:
        paths:
            - "src/server/**"
            - "config/**"
            - "package.json"
            - "package-lock.json"
            - ".github/workflows/test-bug-server.yml"

jobs:
    server-tests:
        name: Server Tests
        runs-on: ubuntu-latest
        steps:
            - name: send slack start message
              id: slack-start
              if: ${{ github.event_name != 'pull_request' }}
              uses: ./.github/actions/slack-run-start
              with:
                  message_prefix: Workflow running

            - name: checkout repository
              uses: actions/checkout@v6

            - name: setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: run dockerized server tests
              run: npm run test:server

            - name: update slack message
              if: ${{ always() && steps.slack-start.outputs.ts != '' }}
              uses: ./.github/actions/slack-run-finish
              with:
                  channel_id: ${{ steps.slack-start.outputs.channel_id }}
                  ts: ${{ steps.slack-start.outputs.ts }}
                  status: ${{ job.status }}
                  message_prefix: Workflow
