<!DOCTYPE html>
<html>

<head>
    <title>BUG Clock</title>
    <style></style>
    <link rel="stylesheet" href="./../css/style.css" />
    <link rel="stylesheet" href="./../css/clock.css" />
</head>

<body id="main">
    <div>
        <h1 id="headertag">On Air Clock</h1>
    </div>

    <div class="clock-large">
        <article class="clock">
            <div class="hours-container">
                <div class="hours"></div>
            </div>
            <div class="minutes-container">
                <div class="minutes"></div>
            </div>
            <div class="seconds-container">
                <div class="seconds"></div>
            </div>
        </article>
    </div>

    <div>
        <h2 id="time"></h2>
    </div>

    <div>
        <h2 id="date"></h2>
    </div>

    <img id="logo" hidden />

    <script src="./../js/axios.min.js"></script>

    <script>
        let timezone = {
            value: "GMT Standard Time",
            abbr: "GMT",
            offset: 0,
            isdst: false,
            label: "(UTC) Edinburgh, London",
            utc: ["Europe/London"],
        };

        let clockTimer;

        const getTimeZoneName = () => timezone?.utc?.[0] || "UTC";

        const getClockParts = () => {
            const formatter = new Intl.DateTimeFormat("en-GB", {
                timeZone: getTimeZoneName(),
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: false,
                weekday: "long",
                year: "numeric",
                month: "long",
                day: "numeric",
            });

            return formatter.formatToParts(new Date()).reduce((parts, part) => {
                if (part.type !== "literal") {
                    parts[part.type] = part.value;
                }

                return parts;
            }, {});
        };

        const scheduleClockTick = () => {
            window.clearTimeout(clockTimer);

            const tick = () => {
                startClock();
                const delay = 1000 - (Date.now() % 1000);
                clockTimer = window.setTimeout(tick, delay);
            };

            tick();
        };

        const getConfig = async () => {
            try {
                const response = await axios.get("./../config");
                const config = response?.data?.data;
                const nextTimezone = response?.data?.data?.timezone;
                const nextTimeZoneName = nextTimezone?.utc?.[0];
                const logoElement = document.getElementById("logo");

                if (config?.backgroundColor) {
                    document.body.style.backgroundColor = config.backgroundColor;
                }
                if (config?.textColor) {
                    document.body.style.color = config.textColor;
                }
                if (config?.header) {
                    document.getElementById("headertag").innerHTML = config.header;
                }
                for (const textElementId of ["headertag", "time", "date"]) {
                    const textElement = document.getElementById(textElementId);
                    textElement.style.fontWeight = config?.fontWeight || "400";
                }
                if (config?.showLogo !== false && config?.logo?.image) {
                    logoElement.src = config.logo.image;
                    logoElement.style.display = "block";
                } else {
                    logoElement.removeAttribute("src");
                    logoElement.style.display = "none";
                }
                if (nextTimezone && nextTimeZoneName !== getTimeZoneName()) {
                    timezone = nextTimezone;
                    getDate();
                    getTime();
                    startClock();
                    scheduleClockTick();
                }

                document.getElementById("date").hidden = !config?.showDate;
                document.getElementById("time").hidden = !config?.showTime;
            } catch (error) {
                console.error(error);
            }
        };

        const getDate = () => {
            const { weekday, month, day, year } = getClockParts();
            const dateString = `${weekday}, ${month} ${day}, ${year}`;
            document.getElementById("date").innerHTML = dateString;
        };

        const getTime = () => {
            const { hour, minute, second } = getClockParts();
            const timeString = `${hour}:${minute}:${second}`;
            document.getElementById("time").innerHTML = timeString;
        };

        const startClock = () => {
            const { hour, minute, second } = getClockParts();
            const seconds = Number(second);
            const minutes = Number(minute);
            const hours = Number(hour) % 12;
            const minuteAngle = minutes * 6 + seconds * 0.1;
            const hourAngle = hours * 30 + minuteAngle / 12;

            const hands = [
                {
                    hand: "hours",
                    angle: hourAngle,
                },
                {
                    hand: "minutes",
                    angle: minuteAngle,
                },
                {
                    hand: "seconds",
                    angle: seconds * 6,
                },
            ];

            // Loop through each of these hands to set their angle
            for (let j = 0; j < hands.length; j++) {
                const elements = document.querySelectorAll("." + hands[j].hand);
                for (let k = 0; k < elements.length; k++) {
                    elements[k].style.webkitTransform = "rotateZ(" + hands[j].angle + "deg)";
                    elements[k].style.transform = "rotateZ(" + hands[j].angle + "deg)";
                    // If this is a minute hand, note the seconds position (to calculate minute position later)
                    if (hands[j].hand === "minutes") {
                        elements[k].parentNode.setAttribute("data-second-angle", hands[j + 1].angle);
                    }
                }
            }
        };

        startClock();
        getDate();
        getTime();
        getConfig();
        scheduleClockTick();
        setInterval(getConfig, 2000);
        setInterval(getDate, 60000);
        setInterval(getTime, 1000);
    </script>
</body>

</html>
