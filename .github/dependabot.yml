version: 2

updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"

      open-pull-requests-limit: 5

      allow:
          - dependency-type: "security"

    - package-ecosystem: "npm"
      directory: "/src/client"
      schedule:
          interval: "weekly"

      open-pull-requests-limit: 5

      allow:
          - dependency-type: "security"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"

      open-pull-requests-limit: 5

      allow:
          - dependency-type: "security"
