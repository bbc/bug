name: Slack Run Finish
description: Update a posted workflow Slack message with final status color, or delete it when skipped.

inputs:
    ts:
        description: Slack message timestamp returned by start action.
        required: true
    status:
        description: Final workflow status (for example success, skipped, failure, cancelled).
        required: true
    message_prefix:
        description: Prefix text for the Slack finish message.
        required: false
        default: Workflow
    extra_text:
        description: Optional trailing text appended to the message.
        required: false
        default: ""

runs:
    using: composite
    steps:
        - name: Set end timestamp
          if: ${{ inputs.status != 'skipped' }}
          id: end-time
          shell: bash
          run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

        - name: Map status to color
          if: ${{ inputs.status != 'skipped' }}
          id: style
          shell: bash
          run: |
              if [[ "${{ inputs.status }}" == "success" ]]; then
                echo "color=#16a34a" >> "$GITHUB_OUTPUT"
                echo "label=succeeded" >> "$GITHUB_OUTPUT"
              else
                echo "color=#dc2626" >> "$GITHUB_OUTPUT"
                echo "label=failed" >> "$GITHUB_OUTPUT"
              fi

        - name: Delete skipped message
          if: ${{ inputs.status == 'skipped' }}
          uses: slackapi/slack-github-action@v2.0.0
          with:
              method: chat.delete
              token: ${{ env.SLACK_BOT_TOKEN }}
              payload: |
                  channel: ${{ env.SLACK_CHANNEL_ID }}
                  ts: ${{ inputs.ts }}

        - name: Update message
          if: ${{ inputs.status != 'skipped' }}
          uses: slackapi/slack-github-action@v2.0.0
          with:
              method: chat.update
              token: ${{ env.SLACK_BOT_TOKEN }}
              payload: |
                  channel: ${{ env.SLACK_CHANNEL_ID }}
                  ts: ${{ inputs.ts }}
                  attachments:
                    - color: "${{ steps.style.outputs.color }}"
                      text: "${{ inputs.message_prefix }} ${{ steps.style.outputs.label }}: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.workflow }}> finished at ${{ steps.end-time.outputs.value }}${{ inputs.extra_text }}"
