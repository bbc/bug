<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Analog 24-hour clock face">
  <defs>
    <radialGradient id="faceGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f4f1e8" />
    </radialGradient>
    <line id="minuteTick" x1="256" y1="14" x2="256" y2="23" stroke="#111111" stroke-width="4" stroke-linecap="round" />
    <line id="hourTick" x1="256" y1="12" x2="256" y2="27" stroke="#111111" stroke-width="8" stroke-linecap="round" />
    <style>
      .outer-hour {
        fill: #111111;
        font-family: Inter, Arial, sans-serif;
        font-size: 40px;
        font-weight: 500;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .inner-hour {
        fill: #c91313;
        font-family: Inter, Arial, sans-serif;
        font-size: 28px;
        font-weight: 500;
        text-anchor: middle;
        dominant-baseline: middle;
      }
    </style>
  </defs>

  <circle cx="256" cy="256" r="244" fill="url(#faceGlow)" stroke="#111111" stroke-width="8" />

